<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎌 Anime Downloader</h1>
            <div class="header-controls">
              <button type="button" id="manualModeToggle" class="mode-toggle">📌 Modalità Manuale: OFF</button>
              <button type="button" id="darkModeToggle" class="dark-mode-toggle">🌙 Dark Mode</button>
            </div>
        </div>

        <!-- Messaggio di risultato -->
        <div id="resultMessage" style="display: none;"></div>

        <!-- Layout 3 colonne: NAS | Downloads | Controlli -->
        <div class="layout">
            <!-- COLONNA SINISTRA: NAS Status -->
            <div class="section" id="nasSection">
                <h2>NAS Status</h2>
                <div id="nasStatusContainer">Caricamento stato NAS...</div>
                <div id="nasControls">
                    <button type="button" id="nasPowerOnBtn">Accendi NAS</button>
                    <button type="button" id="nasPowerOffBtn">Spegni NAS</button>
                    <button type="button" id="nasRemountBtn">Ripara Share</button>
                </div>
            </div>

            <!-- COLONNA CENTRALE: Download Progress -->
            <div class="section" id="progressSection">
                <h2>Download Progress</h2>
                <div id="allDownloadProgressContainer">
                    <!-- Progressi inseriti dinamicamente -->
                </div>

                <!-- Form per avviare nuovo download -->
                <form id="downloadForm" class="form">
                    <h3>Nuovo Download</h3>
                    <label for="anime_id">Anime ID</label>
                    <input type="text" id="anime_id" name="anime_id" required>
                    
                    <button type="button" id="startDownloadBtn">Avvia Download</button>

                    <div id="additionalParams" class="hidden">
                        <label for="start_episode">Episodio iniziale</label>
                        <input type="number" id="start_episode" name="start_episode">
                        
                        <label for="end_episode">Episodio finale</label>
                        <input type="number" id="end_episode" name="end_episode">
                        
                        <label for="custom_path">Percorso personalizzato</label>
                        <input type="text" id="custom_path" name="custom_path">
                    </div>

                    <button type="button" id="toggleParamsBtn">Parametri aggiuntivi</button>
                </form>
            </div>

            <!-- COLONNA DESTRA: Controlli Download -->
            <div class="section" id="downloadControls">
                <h2>Controllo Download</h2>
                <p style="font-size: 12px; color: #666; margin-bottom: 15px;">
                    Gestisci tutti i download in corso
                </p>
                <button type="button" id="pauseAllBtn">⏸ Pausa Tutti</button>
                <button type="button" id="resumeAllBtn">▶ Riprendi Tutti</button>
                <button type="button" id="cancelAllBtn" class="danger">⏹ Annulla Tutti</button>
            </div>
        </div>
    </div>

    <!-- Modular JavaScript imports -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/nas.js') }}"></script>
    <script src="{{ url_for('static', filename='js/downloads.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
</body>
</html>
