services:
  anime_unity_downloader:
    container_name: AnimeUnity-Downloader
    environment:
      - PYTHONUNBUFFERED=1

      - SERVICE_PORT=${SERVICE_PORT:-5000}

      - FLASK_APP=flask_app.py
      - FLASK_DEBUG=${FLASK_DEBUG:-True}
      - FLASK_HOST=${FLASK_HOST:-0.0.0.0}
      - FLASK_PORT=${FLASK_PORT:-5000}
      - SSL_CONTEXT=${SSL_CONTEXT:-None}
      - NAS_MAC_ADDRESS=${NAS_MAC_ADDRESS}
      - NAS_HOST_NAME=${NAS_HOST_NAME}
      - OMV_USER=${OMV_USER}
      - OMV_PASSWORD=${OMV_PASSWORD}
      - SSH_HOST=${SSH_HOST}
      - SSH_USER=${SSH_USER}
      - SSH_PASSWORD=${SSH_PASSWORD}
      - MEDIA_DIRECTORY=${MEDIA_DIRECTORY}
    ports:
      - "8222:${FLASK_PORT}"
    restart: unless-stopped
    build: .
    pull_policy: build
    volumes:
      - ${MEDIA_DIRECTORY}:/app/Downloads
